<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Age Calculator - Calculate Your Exact Age</title>

<meta name="description" content="Free online age calculator to calculate your exact age in years, months and days instantly. Mobile friendly and accurate.">

<meta name="keywords" content="age calculator, calculate age online, birthday calculator, exact age finder">

<meta name="robots" content="index, follow">

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="bg-glow glow1"></div>
<div class="bg-glow glow2"></div>

<div class="app">

<h1 class="title">AGE <span>CALCULATOR</span></h1>

<div class="input-box">
<label>Select Birth Date</label>
<input type="date" id="date-input">
</div>

<button id="calculateBtn" class="neon-btn">CALCULATE</button>

<div class="result-container">

<div class="card">
<div id="years" class="number">--</div>
<div class="label">YEARS</div>
</div>

<div class="card">
<div id="months" class="number">--</div>
<div class="label">MONTHS</div>
</div>

<div class="card">
<div id="days" class="number">--</div>
<div class="label">DAYS</div>
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
